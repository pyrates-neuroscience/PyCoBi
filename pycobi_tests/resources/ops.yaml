%YAML 1.2
---

# PyRates mirror of the auto-07p `ops` demo (optimization of periodic solutions,
# a FitzHugh-Nagumo-like 3D ODE). Used to compare PyCoBi/PyRates' analytical-
# Jacobian continuation against auto-07p's own hand-derived analytical Jacobian.
#
# auto-07p source: $AUTO_DIR/demos/ops/ops.f90
# state vars (matching U(1)..U(3) in the demo): x1, x2, x3  (was x, y, z;
#   renamed because PyRates uses `y` for the state vector in generated fortran)
# parameters (matching PAR(1)..PAR(4)): p1, p2, p3, p4
#
# stpnt picks (p1, p2, p3, p4) = (0.5, 4, 0.9, 2) and seeds the state at the
# equilibrium for those parameters:
#   x1 = p3 = 0.9
#   x2 = -p4*(p3^3/3 - p3) = -2*(0.243 - 0.9) = 1.314
#   x3 = p3 = 0.9
# The auto demo continues PAR(3) (p3) with UZSTOP=0.95.

ops_op:
  base: OperatorTemplate
  equations:
    - "x1' = (-p4*(x1^3/3 - x1) + (x3 - x1)/p2 - x2) / p1"
    - "x2' = x1 - p3"
    - "x3' = -(x3 - x1)/p2"
  variables:
    x1: output(0.9)
    x2: variable(1.314)
    x3: variable(0.9)
    p1: 0.5
    p2: 4.0
    p3: 0.9
    p4: 2.0

ops_pop:
  base: NodeTemplate
  operators:
    - ops_op

ops:
  base: CircuitTemplate
  nodes:
    p: ops_pop
